name: Auto-Update Org README

on:
  # Runs every day at midnight UTC
  schedule:
    - cron: "0 0 * * *"

  # Also runs whenever any repo in the org is created, renamed, or updated
  # (requires org webhook — see setup instructions below)
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

jobs:
  update-readme:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to push the updated README

    steps:
      - name: Checkout .github repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate_readme.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/README.md
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: auto-update org README [skip ci]"
          git push
